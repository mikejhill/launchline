name: Release

on:
  workflow_dispatch:
    inputs:
      force-patch:
        description: "Force a patch version bump (use when only docs/test/chore commits exist)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version
        id: semrel
        uses: go-semantic-release/action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          allow-initial-development-versions: true
          force-bump-patch-version: ${{ inputs.force-patch }}
          dry: true

      - name: Require new version
        if: steps.semrel.outputs.version == ''
        run: |
          echo "::error::No new version to release. Ensure there are unreleased commits with conventional commit messages."
          exit 1

      - name: Create local tag
        run: git tag "v${{ steps.semrel.outputs.version }}"

      - uses: astral-sh/setup-uv@v6
      - run: uv sync --group dev
      - run: uv run pytest

      - name: Rewrite README image paths for PyPI
        run: |
          sed -i "s|(docs/|(https://raw.githubusercontent.com/${{ github.repository }}/v${{ steps.semrel.outputs.version }}/docs/|g" README.md

      - run: uv build
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ steps.semrel.outputs.version }}

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Push tag
        run: git push origin "v${{ steps.semrel.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.semrel.outputs.version }}"
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.whl

  pypi:
    needs: release
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
